name: IET Sledgehammer MAX-REVERT
on: [push]

# This tells GitHub the robot is allowed to change the code ✍️
permissions:
  contents: write

jobs:
  defense:
    runs-on: self-hosted  # Your robot will pick this up! 🤖✨
    
    # ONLY run this if the person is NOT you (the owner) 👮‍♂️
    if: github.actor != github.repository_owner
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Get the full history so we can go back in time ⏳

      - name: Max Power Sledgehammer Reset
        run: |
          echo "Unauthorized access detected by ${{ github.actor }}!"
          echo "IET SECURITY ACT (IETSA) TRIGGERED."
          
          # Tell Git who is doing the cleaning 🧹
          git config --global user.name "IET MAX SECURITY"
          git config --global user.email "timmytheonlinegirl@hotmail.com"
          
          # Delete the bad stuff and force it back to how it was! 🔨💥
          git reset --hard HEAD~1
          git push origin ${{ github.ref_name }} --force
